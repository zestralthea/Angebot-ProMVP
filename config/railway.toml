[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[[services]]
name = "angebotpro"
source = "."

[services.variables]
NODE_ENV = "production"
PORT = "3000"
